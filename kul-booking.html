<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kul Booking - SK Store</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #fff8e1, #ffe0b2);
}

header{
    background:#ff6f00;
    color:white;
    padding:15px;
    text-align:center;
}

.container{
    max-width:400px;
    margin:40px auto;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:12px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#2e7d32;
}

.total{
    margin-top:15px;
    font-weight:bold;
    color:#e65100;
    text-align:center;
}

.back{
    text-align:center;
    margin-top:15px;
}

.back a{
    text-decoration:none;
    color:#ff6f00;
    font-weight:bold;
}
</style>
</head>

<body>

<header>
    🍒 Kul Booking (30 pcs = ₹10)
</header>

<div class="container">

    <label>Your Name:</label>
    <input type="text" id="name" placeholder="Enter your name">

    <label>Number of Packs:</label>
    <input type="number" id="qty" placeholder="Enter quantity" oninput="calculateTotal()">

    <div class="total" id="totalPrice">
        Total Price: ₹0
    </div>

    <button onclick="placeOrder()">Place Order</button>

    <div class="back">
        <a href="index.html">⬅ Back to Home</a>
    </div>

</div>

<script>
function calculateTotal(){
    let qty = document.getElementById("qty").value || 0;
    let total = qty * 10;
    document.getElementById("totalPrice").innerText = "Total Price: ₹" + total;
}

function placeOrder(){
    let name = document.getElementById("name").value;
    let qty = document.getElementById("qty").value;

    if(name=="" || qty==""){
        alert("Please fill all details!");
        return;
    }

    alert("Order Placed Successfully!\\nThank you " + name);
}
</script>

</body>
</html>
